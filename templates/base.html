{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#FAF7F2">
    <title>{% block title %}ESEPTEP — расчёт ремонта и материалов{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    <div class="app-shell">
        <header class="site-header" aria-label="Главная навигация">
            <a class="brand" href="{% url 'core:home' %}" aria-label="ESEPTEP на главную">
                <span class="brand__mark">E</span>
                <span class="brand__text">ESEPTEP</span>
            </a>
            <nav class="site-nav" aria-label="Разделы">
                <a href="{% url 'calculators:home' %}">Калькуляторы</a>
                <a href="{% url 'marketplace:home' %}">Мастера</a>
                <a href="{% url 'projects:home' %}">Проекты</a>
            </nav>
            {% if request.user.is_authenticated %}
            <a class="header-action" href="{% url 'accounts:logout' %}">Выйти</a>
            {% else %}
            <a class="header-action" href="{% url 'accounts:login' %}">Войти</a>
            {% endif %}
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <a class="floating-whatsapp" href="https://wa.me/?text=ESEPTEP%20-%20нужна%20консультация%20по%20ремонту" aria-label="Написать в WhatsApp">WA</a>

    <nav class="mobile-bottom-cta" aria-label="Быстрые действия">
        <a class="mobile-bottom-cta__item" href="{% url 'core:home' %}">
            <span>⌂</span>
            <b>Главная</b>
        </a>
        <a class="mobile-bottom-cta__item mobile-bottom-cta__item--primary" href="{% url 'calculators:home' %}">
            <span>+</span>
            <b>Расчёт</b>
        </a>
        <a class="mobile-bottom-cta__item" href="{% url 'projects:home' %}">
            <span>⇧</span>
            <b>Проект</b>
        </a>
    </nav>

    <script src="{% static 'js/app.js' %}" defer></script>
</body>
</html>
