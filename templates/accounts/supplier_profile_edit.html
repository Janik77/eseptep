{% extends 'base.html' %}
{% block title %}Профиль поставщика — ESEPTEP{% endblock %}
{% block content %}
<section class="auth-wrap"><div class="auth-card"><h1>Редактирование профиля поставщика</h1><form method="post" class="auth-form">{% csrf_token %}{% for field in form %}<label class="auth-field"><span>{{ field.label }}</span>{{ field }}{% if field.errors %}<small>{{ field.errors|striptags }}</small>{% endif %}</label>{% endfor %}<button class="btn btn--primary" type="submit">Сохранить профиль</button></form></div></section>
{% endblock %}
