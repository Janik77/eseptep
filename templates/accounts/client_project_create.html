{% extends 'base.html' %}
{% block title %}Новый проект — ESEPTEP{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="auth-card">
    <h1>Создать проект</h1>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {% for field in form %}
      <label class="auth-field">
        <span>{{ field.label }}</span>
        {{ field }}
        {% if field.errors %}<small>{{ field.errors|striptags }}</small>{% endif %}
      </label>
      {% endfor %}
      <button type="submit" class="btn btn--primary">Сохранить проект</button>
    </form>
  </div>
</section>
{% endblock %}
